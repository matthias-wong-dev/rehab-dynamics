  <main>
    <section class="page-title"><div class="wrap"><p class="eyebrow">前端模拟表单</p><h1>转介表</h1><p>用于收集转介人、客户、理赔和所需服务信息。后台接入前，提交会停留在浏览器内。</p></div></section>
    <section class="section">
      <div class="wrap">
        <form class="form-panel form-grid" data-mock-form>
          <fieldset class="field full"><legend>转介来源</legend><div class="form-grid"><div class="field"><label for="referrer-name">转介人姓名 *</label><input id="referrer-name" required></div><div class="field"><label for="referrer-org">机构/公司</label><input id="referrer-org"></div><div class="field"><label for="referrer-email">电邮 *</label><input id="referrer-email" type="email" required></div><div class="field"><label for="referrer-phone">电话 *</label><input id="referrer-phone" required></div></div></fieldset>
          <fieldset class="field full"><legend>客户资料</legend><div class="form-grid"><div class="field"><label for="client-first">客户名字 *</label><input id="client-first" required></div><div class="field"><label for="client-last">客户姓氏 *</label><input id="client-last" required></div><div class="field"><label for="client-dob">出生日期</label><input id="client-dob" type="date"></div><div class="field"><label for="client-phone">客户电话</label><input id="client-phone"></div><div class="field full"><label for="client-address">地址</label><input id="client-address"></div></div></fieldset>
          <fieldset class="field full"><legend>理赔与服务</legend><div class="form-grid"><div class="field"><label for="claim-type">理赔类型 *</label><select id="claim-type" required><option value="">请选择</option><option>Workers Compensation</option><option>CTP</option><option>NDIS</option><option>Support At Home</option><option>DVA</option><option>其他</option></select></div><div class="field"><label for="claim-number">理赔号码</label><input id="claim-number"></div><div class="field"><label for="insurer">保险公司/计划管理方</label><input id="insurer"></div><div class="field"><label for="injury-date">受伤日期</label><input id="injury-date" type="date"></div><div class="field full"><label for="services">需要的服务 *</label><textarea id="services" required placeholder="例如：初步评估、功能能力评估、工作场所评估、职业治疗评估"></textarea></div></div></fieldset>
          <div class="field full"><label for="notes">补充说明</label><textarea id="notes"></textarea></div>
          <button class="button" type="submit">提交转介</button>
          <div class="notice full" role="status"></div>
        </form>
      </div>
    </section>
  </main>
